<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | Antigraviity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="portal-layout">
        <aside id="main-sidebar" class="sidebar">
            <!-- Sidebar content injected by JS -->
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 id="page-title">Resignation Tracking</h1>
                    <p id="page-subtitle" style="color: var(--text-muted);">Track your transition and offboarding
                        status.</p>
                </div>
                <div class="header-user">
                    <div id="notification-bell" style="position: relative; cursor: pointer; margin-right: 1.5rem;"
                        onclick="toggleNotifDropdown(event)">
                        <i data-lucide="bell"></i>
                        <span id="notif-dot"
                            style="display: none; position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; border: 2px solid white;"></span>

                        <!-- Notif Dropdown -->
                        <div id="notif-dropdown"
                            style="display: none; position: absolute; top: 100%; right: 0; width: 300px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 1000; margin-top: 10px; text-align: left; padding: 1rem;">
                            <h4 style="font-size: 0.85rem; margin-bottom: 0.75rem; color: var(--text-main);">
                                Notifications</h4>
                            <div id="notif-list" style="max-height: 300px; overflow-y: auto;">
                                <p
                                    style="font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 1rem;">
                                    No new notifications</p>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 700; font-size: 0.9rem;" id="header-user-name">--</p>
                        <p style="font-size: 0.75rem; color: var(--text-muted);" id="header-user-id">--</p>
                    </div>
                    <div class="user-avatar" id="header-user-avatar">?</div>
                </div>
            </header>

            <div class="page-container" id="portal-body">
                <!-- Content will be injected by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Company Switcher Modal -->
    <div id="company-switcher" class="modal-overlay" style="display: none;">
        <div class="portal-selector-card">
            <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Switch Portal</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Select the company dashboard
                you want to access.</p>

            <div class="company-option" onclick="selectCompany('Antigraviity')">
                <div class="company-logo-circle" style="background: #6366f1;">
                    <i data-lucide="shield-check" style="color: white; width: 24px;"></i>
                </div>
                <div>
                    <h3 style="font-size: 1rem; font-weight: 700;">Antigraviity</h3>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">Workforce & Resignation Portal</p>
                </div>
            </div>

            <div class="company-option" onclick="selectCompany('Forge India')">
                <div class="company-logo-circle" style="background: var(--forge-blue);">
                    <i data-lucide="zap" style="color: var(--forge-yellow); width: 24px;"></i>
                </div>
                <div>
                    <h3 style="font-size: 1rem; font-weight: 700;">Forge India Connect</h3>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">Operations & Connectivity Portal</p>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem; background: var(--text-muted);"
                onclick="toggleSwitcher(false)">Cancel</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const MY_ID = localStorage.getItem('MY_ID') || 'EMP010';
        const MY_NAME = localStorage.getItem('MY_NAME') || 'Dhanush C.';
        let activeCompany = localStorage.getItem('activeCompany') || 'Antigraviity';


        function toggleSwitcher(show) {
            document.getElementById('company-switcher').style.display = show ? 'flex' : 'none';
            if (show) lucide.createIcons();
        }

        function selectCompany(company) {
            activeCompany = company;
            localStorage.setItem('activeCompany', company);
            toggleSwitcher(false);
            initPortal();
        }

        function renderSidebar(hasTransfers = false) {
            const sidebar = document.getElementById('main-sidebar');
            const isForge = activeCompany === 'Forge India';
            
            sidebar.innerHTML = `
                <div class="brand" style="margin-bottom: 2rem; ${isForge ? 'border-bottom: none; padding-top: 1rem;' : ''}">
                    ${isForge ? `
                        <div style="display: flex; flex-direction: column; align-items: start;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div style="width: 28px; height: 28px; background: #0055b8; position: relative; border-radius: 2px;">
                                    <div style="position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-left: 12px solid transparent; border-bottom: 12px solid #facc15;"></div>
                                </div>
                                <div style="font-size: 1.4rem; font-weight: 800; color: #0055b8; line-height: 1;">
                                    FORGE <span style="color: #facc15;">INDIA</span>
                                </div>
                            </div>
                            <span style="font-size: 0.7rem; color: #0055b8; font-weight: 700; letter-spacing: 4px; margin-top: 5px; margin-left: 38px;">CONNECT</span>
                        </div>
                    ` : `
                        <div class="brand-icon"></div>
                        <span>Antigraviity</span>
                    `}
                </div>

                <div class="sidebar-group">
                    <p class="sidebar-group-label">Main</p>
                    <nav class="nav-menu">
                        <a href="#" class="nav-link ${currentSubView === 'dashboard' ? 'active' : ''}" onclick="switchSubView('dashboard')"><i data-lucide="layout-dashboard"></i> Home</a>
                        <a href="#" class="nav-link ${currentSubView === 'activity' ? 'active' : ''}" onclick="switchSubView('activity')"><i data-lucide="activity"></i> My Activity</a>
                    </nav>
                </div>

                <div class="sidebar-group">
                    <p class="sidebar-group-label">Employee Services</p>
                    <nav class="nav-menu">
                        <a href="#" class="nav-link ${currentSubView === 'attendance' ? 'active' : ''}" onclick="switchSubView('attendance')"><i data-lucide="clock"></i> Attendance</a>
                        <a href="#" class="nav-link ${currentSubView === 'leaves' ? 'active' : ''}" onclick="switchSubView('leaves')"><i data-lucide="calendar"></i> Leaves</a>
                        ${!isForge ? `<a href="#" class="nav-link ${currentSubView === 'resignation' ? 'active' : ''}" onclick="switchSubView('resignation')"><i data-lucide="file-x"></i> Resignation</a>` : ''}
                        ${hasTransfers ? `<a href="#" class="nav-link ${currentSubView === 'transfers' ? 'active' : ''}" onclick="switchSubView('transfers')"><i data-lucide="arrow-right-left"></i> Transfer Order</a>` : ''}
                    </nav>
                </div>

                <div class="sidebar-group">
                    <p class="sidebar-group-label">Personal Hub</p>
                    <nav class="nav-menu">
                        <a href="#" class="nav-link ${currentSubView === 'documents' ? 'active' : ''}" onclick="switchSubView('documents')"><i data-lucide="folder"></i> My Documents</a>
                        <a href="#" class="nav-link ${currentSubView === 'profile' ? 'active' : ''}" onclick="switchSubView('profile')"><i data-lucide="user"></i> My Profile</a>
                    </nav>
                </div>

                <div class="sidebar-group">
                    <p class="sidebar-group-label">Support</p>
                    <nav class="nav-menu">
                        <a href="#" class="nav-link ${currentSubView === 'help' ? 'active' : ''}" onclick="switchSubView('help')"><i data-lucide="help-circle"></i> Help & Support</a>
                    </nav>
                </div>

                <div class="profile-card" onclick="switchSubView('profile')">
                    <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.8rem;">${MY_NAME.charAt(0)}</div>
                    <div style="flex: 1; overflow: hidden;">
                        <p style="font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main);">${MY_NAME}</p>
                        <p style="font-size: 0.65rem; color: var(--text-muted);">${MY_ID}</p>
                    </div>
                    <a href="index.html" style="color: var(--text-muted); cursor: pointer;" title="Logout"><i data-lucide="log-out" style="width: 16px;"></i></a>
                </div>
            `;
            
            if (isForge) sidebar.classList.add('forge-sidebar');
            else sidebar.classList.remove('forge-sidebar');
        }

        let currentSubView = 'dashboard';
        function switchSubView(view) {
            currentSubView = view;
            renderSidebar(HAS_TRANSFERS);
            renderContent();
            lucide.createIcons();
        }

        async function renderContent() {
            const container = document.getElementById('portal-body');
            container.innerHTML = '';

            try {
                if (currentSubView === 'dashboard') await renderHomeDashboard(container);
                else if (currentSubView === 'attendance') await renderAttendanceView(container);
                else if (currentSubView === 'leaves') await renderLeaveView(container);
                else if (currentSubView === 'transfers') await renderTransferView(container);
                else if (currentSubView === 'resignation' && activeCompany !== 'Forge India') await renderAntigraviityResignation(container);
                else if (currentSubView === 'documents') renderDocumentsView(container);
                else if (currentSubView === 'profile') renderProfileView(container);
                else if (currentSubView === 'activity') renderActivityView(container);
                else if (currentSubView === 'help') renderHelpView(container);
                else await renderHomeDashboard(container);
                lucide.createIcons();
            } catch (error) {
                console.error("Render Error:", error);
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 4rem;">
                        <i data-lucide="alert-triangle" style="width: 48px; height: 48px; color: var(--danger); margin-bottom: 1rem;"></i>
                        <h3>Internal Portal Error</h3>
                        <p style="color: var(--text-muted);">We encountered an error while loading this view.</p>
                        <button class="btn btn-primary" style="margin-top: 1rem;" onclick="location.reload()">Refresh Portal</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        async function renderHomeDashboard(container) {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good Morning' : (hour < 17 ? 'Good Afternoon' : 'Good Evening');
            
            document.getElementById('page-title').textContent = `${greeting}, ${MY_NAME} 👋`;
            document.getElementById('page-subtitle').textContent = "Welcome back to your employee portal.";

            container.innerHTML = '<div style="text-align: center; padding: 4rem;"><p>Syncing dashboard data...</p></div>';

            try {
                const [stats, activity] = await Promise.all([
                    api.getStats(MY_ID),
                    api.getActivity(MY_ID)
                ]);

                container.innerHTML = `
                    <div class="quick-actions">
                        <button class="btn btn-primary" onclick="switchSubView('leaves')"><i data-lucide="calendar-plus"></i> Apply Leave</button>
                        <button class="btn btn-outline" onclick="switchSubView('attendance')"><i data-lucide="clock"></i> Mark Attendance</button>
                        ${activeCompany === 'Antigraviity' ? `<button class="btn btn-outline" onclick="switchSubView('resignation')"><i data-lucide="file-text"></i> Exit Process</button>` : ''}
                    </div>

                    <div class="dashboard-grid">
                        <div class="stat-card">
                            <span class="stat-label">Leave Balance</span>
                            <div style="display: flex; align-items: baseline; gap: 8px;">
                                <span class="stat-value">${stats.leaveBalance}</span>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Days</span>
                            </div>
                            <div style="margin-top: 1rem; height: 4px; background: #f1f5f9; border-radius: 2px;">
                                <div style="width: ${(stats.leaveBalance / 15) * 100}%; height: 100%; background: var(--success); border-radius: 2px;"></div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Monthly Presence</span>
                            <div style="display: flex; align-items: baseline; gap: 8px;">
                                <span class="stat-value">${stats.attendanceRate}</span>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">%</span>
                            </div>
                            <div style="margin-top: 1rem; height: 4px; background: #f1f5f9; border-radius: 2px;">
                                <div style="width: ${stats.attendanceRate}%; height: 100%; background: var(--primary); border-radius: 2px;"></div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Pending Actions</span>
                            <div style="display: flex; align-items: baseline; gap: 8px;">
                                <span class="stat-value">${stats.pendingTasks}</span>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Tasks</span>
                            </div>
                            <div style="margin-top: 1rem; color: ${stats.pendingTasks > 0 ? 'var(--warning)' : 'var(--success)'}; font-size: 0.7rem; font-weight: 600;">
                                ${stats.pendingTasks > 0 ? 'Action Required' : 'All caught up'}
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Working At</span>
                            <div style="display: flex; align-items: baseline; gap: 8px;">
                                <span style="font-size: 1rem; font-weight: 800; color: ${activeCompany === 'Forge India' ? 'var(--forge-blue)' : 'var(--primary)'};">${activeCompany}</span>
                            </div>
                            <div style="margin-top: 1rem; cursor: pointer; color: var(--primary); font-size: 0.7rem; font-weight: 600;" onclick="toggleSwitcher(true)">Switch Org →</div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Recent Activity</h3>
                                <button class="btn btn-outline" style="padding: 0.3rem 0.6rem; font-size: 0.7rem;" onclick="switchSubView('activity')">View All</button>
                            </div>
                            <div id="dashboard-activity">
                                ${activity.length > 0 ? activity.map(a => `
                                    <div style="padding: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem;">
                                        <div style="width: 32px; height: 32px; background: var(--bg-main); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                                            <i data-lucide="${a.icon}" style="width: 16px;"></i>
                                        </div>
                                        <div style="flex: 1;">
                                            <p style="font-size: 0.85rem; font-weight: 700;">${a.title}</p>
                                            <p style="font-size: 0.75rem; color: var(--text-muted);">${a.subtitle}</p>
                                        </div>
                                        <div style="font-size: 0.7rem; color: var(--text-muted);">${new Date(a.date).toLocaleDateString()}</div>
                                    </div>
                                `).join('') : '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">No recent logs.</div>'}
                            </div>
                        </div>
                        <div class="card">
                            <h3 class="card-title" style="margin-bottom: 1.5rem;">Policies & Help</h3>
                            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                <div style="padding: 12px; background: #F8FAFC; border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer;">
                                    <div style="width: 28px; height: 28px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                                        <i data-lucide="book-open" style="width: 14px;"></i>
                                    </div>
                                    <span style="font-size: 0.8rem; font-weight: 600;">Employee Handbook</span>
                                </div>
                                <div style="padding: 12px; background: #F8FAFC; border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer;">
                                    <div style="width: 28px; height: 28px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--warning);">
                                        <i data-lucide="shield" style="width: 14px;"></i>
                                    </div>
                                    <span style="font-size: 0.8rem; font-weight: 600;">IT & Security Code</span>
                                </div>
                                <button class="btn btn-outline" style="width: 100%; margin-top: 1rem; font-size: 0.8rem;" onclick="switchSubView('help')">Contact Admin Support</button>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = `<div class="card" style="text-align: center; padding: 2rem; border-color: var(--danger);">Failed to load dashboard data. Please ensure server is running.</div>`;
            }
        }

        async function renderDocumentsView(container) {
            document.getElementById('page-title').textContent = "My Document Vault";
            document.getElementById('page-subtitle').textContent = "Securely access your employment records.";
            container.innerHTML = '<div style="text-align: center; padding: 4rem;"><p>Fetching documents...</p></div>';

            try {
                const docs = await api.getDocuments(MY_ID);
                container.innerHTML = `
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Document Name</th><th>Type</th><th>Issue Date</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody>
                                    ${docs.map(doc => `
                                        <tr>
                                            <td style="font-weight: 600;">${doc.name}</td>
                                            <td><span class="badge" style="background: #f1f5f9; color: #475569;">${doc.type}</span></td>
                                            <td>${doc.date}</td>
                                            <td><span class="badge ${doc.status === 'Verified' || doc.status === 'Released' ? 'badge-success' : 'badge-blue'}">${doc.status}</span></td>
                                            <td><button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;"><i data-lucide="download" style="width: 14px;"></i> Download</button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = '<div class="card" style="text-align: center; color: var(--danger);">Could not retrieve documents.</div>';
            }
        }

        function renderProfileView(container) {
            document.getElementById('page-title').textContent = "My Profile";
            document.getElementById('page-subtitle').textContent = "View and manage your core identity details.";
            container.innerHTML = `
                <div style="max-width: 700px; margin: 0 auto;">
                    <div class="card" style="text-align: center; padding: 3rem;">
                        <div class="user-avatar" style="width: 100px; height: 100px; font-size: 2.5rem; margin: 0 auto 1.5rem;">${MY_NAME.charAt(0)}</div>
                        <h2 style="font-size: 1.5rem; font-weight: 800;">${MY_NAME}</h2>
                        <p style="color: var(--text-muted);">${MY_ID} • ${activeCompany}</p>
                        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                            <button class="btn btn-outline"><i data-lucide="edit"></i> Edit Profile</button>
                        </div>
                    </div>
                    <div class="card">
                        <h3 class="card-title" style="margin-bottom: 1.5rem;">Security & Session</h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                                <div><p style="font-weight: 600;">Account Status</p><p style="font-size: 0.8rem; color: var(--text-muted);">Active and Verified</p></div>
                                <span class="badge badge-success">Verified</span>
                            </div>
                            <button class="btn btn-danger" onclick="location.href='index.html'" style="width: 100%; border-color: #ef4444; color: #ef4444;">
                                <i data-lucide="log-out"></i> Secure Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActivityView(container) { container.innerHTML = '<div class="card" style="text-align: center; padding: 5rem;"><i data-lucide="activity" style="width: 48px; color: #eee; margin-bottom: 1rem;"></i><p>Your requests and activity history will appear here.</p></div>'; }
        function renderHelpView(container) { container.innerHTML = '<div class="card" style="text-align: center; padding: 5rem;"><i data-lucide="help-circle" style="width: 48px; color: #eee; margin-bottom: 1rem;"></i><p>Contact HR Support: support@antigraviity.tech</p></div>'; }

        async function renderAntigraviityResignation(container) {
            document.getElementById('page-title').textContent = "Resignation Tracking";
            document.getElementById('page-subtitle').textContent = "Track your transition and offboarding status.";

            container.innerHTML = '<div style="text-align: center; padding: 4rem;"><p>Loading resignation status...</p></div>';

            try {
                const all = await api.getResignations();
                const myHistory = (all || []).filter(r => r.employeeId === MY_ID).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                const last = myHistory[0];

                if (!last || last.status === 'Rejected') {
                    if (last && last.status === 'Rejected') {
                        showRejectionNotification(last.managerComments);
                    }
                    showSubmissionForm(container);
                } else {
                    showTrackingDashboard(container, last);
                }
            } catch (error) {
                throw error; // Let renderContent handle it
            }
        }

        // --- HRMS: ATTENDANCE ---
        let clockTimer;
        async function renderAttendanceView(container) {
            document.getElementById('page-title').textContent = "Attendance Terminal";
            document.getElementById('page-subtitle').textContent = "Log your work hours and track your presence.";

            container.innerHTML = '<div style="text-align: center; padding: 4rem;"><p>Loading attendance records...</p></div>';

            try {
                const history = await api.getAttendance(MY_ID);
                const todayStr = new Date().toISOString().split('T')[0];
                const today = history.find(a => a.date === todayStr);

                container.innerHTML = `
                <div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
                    <div style="display: flex; flex-direction: column; gap: 2rem;">
                        <div class="card" style="text-align: center; padding: 2.5rem;">
                            <h3 class="card-title">${today && today.clockOut ? 'Shift Completed' : (today ? 'Shift In Progress' : 'Ready to Start')}</h3>
                            <div class="digital-clock" id="live-clock">00:00:00</div>
                            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.8rem;">Current Server Time</p>
                            
                            ${!today ? `
                                <button class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;" onclick="handleClockAction('in')">
                                    <i data-lucide="play"></i> Punch In
                                </button>
                            ` : (today.clockOut ? `
                                <div style="padding: 1rem; background: #f0fdf4; border-radius: 12px; border: 1px solid #bbf7d0; color: #166534; font-weight: 600;">
                                    <i data-lucide="check-circle" style="display: inline; vertical-align: middle;"></i> Attendance Recorded
                                </div>
                            ` : `
                                <button class="btn" style="width: 100%; padding: 1rem; font-size: 1.1rem; background: var(--danger); color: white;" onclick="handleClockAction('out')">
                                    <i data-lucide="square"></i> Punch Out
                                </button>
                            `)}

                            <div style="margin-top: 1.5rem; text-align: left; font-size: 0.8rem; background: #f8fafc; padding: 1rem; border-radius: 8px;">
                                <p style="font-weight: 700; margin-bottom: 4px; color: var(--text-main);">Shift Policy</p>
                                <p style="color: var(--text-muted);">Shift: 09:30 AM - 06:30 PM</p>
                                <p style="color: var(--text-muted);">Grace Time: Until 10:00 AM</p>
                                <p style="color: var(--text-muted);">Half Day: < 8 Hours</p>
                            </div>
                        </div>

                        <div class="card">
                            <h3 class="card-title">Recent History</h3>
                            <div style="max-height: 300px; overflow-y: auto;">
                                ${history.length === 0 ? '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No records found.</p>' :
                                    [...history].reverse().map(h => `
                                        <div style="padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                                            <div>
                                                <p style="font-weight: 700; font-size: 0.85rem;">${new Date(h.date).toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' })}</p>
                                                <p style="font-size: 0.7rem; color: var(--text-muted);">In: ${new Date(h.clockIn).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} ${h.clockOut ? '| Out: ' + new Date(h.clockOut).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}</p>

                                            <span class="badge ${h.status === 'Present' ? 'badge-success' : (h.status === 'Late Login' ? 'badge-blue' : 'badge-danger')}">${h.status}</span>

                                }

                    <div style="display: flex; flex-direction: column; gap: 2rem;">
                        <div class="card calendar-card">
                            <div id="attendance-calendar"></div>
                        </div>

                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
                            <div class="card" style="padding: 1.5rem; text-align: center;">
                                <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Total Present</p>
                                <h2 style="font-size: 1.5rem; color: #10b981;">${history.filter(h => h.status === 'Present').length}</h2>
                            </div>
                            <div class="card" style="padding: 1.5rem; text-align: center;">
                                <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Late Logins</p>
                                <h2 style="font-size: 1.5rem; color: #3b82f6;">${history.filter(h => h.status === 'Late Login').length}</h2>
                            </div>
                            <div class="card" style="padding: 1.5rem; text-align: center;">
                                <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Half Days</p>
                                <h2 style="font-size: 1.5rem; color: #f97316;">${history.filter(h => h.status === 'Half Day').length}</h2>
                            </div>

                </div>
            `;

                renderCalendar(history);
                startClock();
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 3rem; border: 1px dashed var(--danger);">
                        <i data-lucide="alert-circle" style="color: var(--danger); width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                        <h3 style="color: var(--danger);">Failed to load attendance</h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please ensure the server is running and try again.</p>
                        <button class="btn btn-primary" onclick="renderAttendanceView(document.getElementById('portal-body'))">Retry</button>
                    </div>
                `;
                lucide.createIcons();
            }

        function startClock() {
            clearInterval(clockTimer);
            const el = document.getElementById('live-clock');
            const update = () => {
                const now = new Date();
                if (el) el.textContent = now.toLocaleTimeString([], { hour12: false });
            }
            update();
            clockTimer = setInterval(update, 1000);
        }

        async function handleClockAction(type) {
            try {
                if (type === 'in') await api.clockIn(MY_ID);
                else await api.clockOut(MY_ID);
                renderContent();
            } catch (e) {
                alert('Action failed. Are you already clocked in?');
            }
        }

        function renderCalendar(history) {
            const calEl = document.getElementById('attendance-calendar');
            const now = new Date();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const month = now.getMonth();
            const year = now.getFullYear();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = `
                <div class="calendar-header">
                    <h3 style="font-weight: 800;">${monthNames[month]} ${year}</h3>
                    <div style="display: flex; gap: 15px;">
                        <div class="legend-item"><div class="legend-box" style="background: #22c55e;"></div> Present</div>
                        <div class="legend-item"><div class="legend-box" style="background: #3b82f6;"></div> Late</div>
                        <div class="legend-item"><div class="legend-box" style="background: #f97316;"></div> Half Day</div>
                    </div>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-day-label">Sun</div><div class="calendar-day-label">Mon</div><div class="calendar-day-label">Tue</div>
                    <div class="calendar-day-label">Wed</div><div class="calendar-day-label">Thu</div><div class="calendar-day-label">Fri</div>
                    <div class="calendar-day-label">Sat</div>
            `;
            
            // Empty cells for alignment
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="calendar-day empty"></div>';
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const log = history.find(h => h.date === dateStr);
                const dayOfWeek = new Date(year, month, day).getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                
                let cls = 'calendar-day';
                if (isWeekend) cls += ' weekend';
                
                if (log) {
                    if (log.status === 'Present') cls += ' present';
                    else if (log.status === 'Late Login') cls += ' late';
                    else if (log.status === 'Half Day') cls += ' half-day';
                }
                
                html += `
                    <div class="${cls}">
                        ${day}
                        ${log ? '<div class="day-dot"></div>' : ''}
                    </div>
                `;
            }
            
            html += '</div>';
            calEl.innerHTML = html;
        }

        // --- HRMS: LEAVES ---

            try {
                const leaves = await api.getLeaves(MY_ID);

                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">

                            <h3 class="card-title">Apply for Leave</h3>
                            <div class="form-group">
                                <label class="label">Leave Type</label>
                                <select id="leave-type" class="input">

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                                <div class="form-group">

                            </div>
                            <div class="form-group">

                                <textarea id="leave-reason" class="input" rows="3" placeholder="Briefly explain your leave request..."></textarea>

                            <button class="btn btn-primary" style="width: 100%;" onclick="submitLeaveRequest()">Submit Application</button>
                        </div>

                        <div class="card">

                                <table style="width: 100%; border-collapse: collapse; text-align: left;">

                                            <th style="padding: 1rem 0.5rem;">Type</th>
                                            <th style="padding: 1rem 0.5rem;">Period</th>
                                            <th style="padding: 1rem 0.5rem;">Days</th>
                                            <th style="padding: 1rem 0.5rem;">Status</th>

                                                        <td style="padding: 1rem 0.5rem;">
                                                            <span class="badge ${l.status === 'Approved' ? 'badge-success' : (l.status === 'Rejected' ? 'badge-danger' : 'badge-blue')}">${l.status}</span>
                                                        </td>
                                                    </tr>
                                                `;
                        }).join('')
                    }
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 3rem; border: 1px dashed var(--danger);">
                        <i data-lucide="alert-circle" style="color: var(--danger); width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                        <h3 style="color: var(--danger);">Failed to load leave records</h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please check your connection and try again.</p>
                        <button class="btn btn-primary" onclick="renderLeaveView(document.getElementById('portal-body'))">Retry</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        async function submitLeaveRequest() {
            const data = {
                employeeId: MY_ID,
                employeeName: MY_NAME,
                type: document.getElementById('leave-type').value,
                startDate: document.getElementById('leave-start').value,
                endDate: document.getElementById('leave-end').value,
                reason: document.getElementById('leave-reason').value
            };

            if (!data.startDate || !data.endDate) { alert('Please select dates.'); return; }

            try {
                await api.submitLeave(data);
                alert('Leave request submitted!');
                renderContent();
            } catch (e) {
                alert('Submission failed.');
            }
        }

        function showRejectionNotification(reason) {
            document.getElementById('notif-dot').style.display = 'block';
            const list = document.getElementById('notif-list');
            list.innerHTML = `
                <div style="padding: 0.75rem; background: #fef2f2; border-radius: 8px; border-left: 4px solid var(--danger);">
                    <p style="font-size: 0.8rem; font-weight: 600; color: #991B1B; margin-bottom: 4px;">Resignation Rejected</p>
                    <p style="font-size: 0.75rem; color: #b91c1c;">${reason}</p>
                </div>
            `;
        }

        function toggleNotifDropdown(e) {
            e.stopPropagation();
            const dd = document.getElementById('notif-dropdown');
            const isVisible = dd.style.display === 'block';
            dd.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) document.getElementById('notif-dot').style.display = 'none';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            document.getElementById('notif-dropdown').style.display = 'none';
        });

        function showSubmissionForm(container) {
            document.getElementById('page-title').textContent = "Submit Resignation";
            document.getElementById('page-subtitle').textContent = "Initiate your departure process.";

            const minDate = new Date();
            minDate.setDate(minDate.getDate() + 30);
            const maxDate = new Date();
            maxDate.setDate(maxDate.getDate() + 90);

            const minStr = minDate.toISOString().split('T')[0];
            const maxStr = maxDate.toISOString().split('T')[0];

            container.innerHTML = `
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <h3 class="card-title">Initial Submission</h3>
                    <div class="form-group">
                        <label class="label">Reason for Resignation</label>
                        <select class="input" id="reason">
                            <option>Better Opportunity</option>
                            <option>Career Change</option>
                            <option>Personal Reasons</option>
                            <option>Health Issues</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label">Personal Email Address (For Relieving Letter)</label>
                        <input type="email" class="input" id="personalEmail" placeholder="yourname@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label class="label">Anticipated Last Working Day (Min 30, Max 90 days)</label>
                        <input type="date" class="input" id="lwd" min="${minStr}" max="${maxStr}" value="${minStr}">
                    </div>
                    <div class="form-group">
                        <label class="label">Comments</label>
                        <textarea class="input" id="comments" rows="4" placeholder="Briefly explain your departure..."></textarea>
                    </div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="submitForm()">Submit Resignation</button>
                </div>
            `;
        }

        async function submitForm() {
            const personalEmail = document.getElementById('personalEmail').value;
            if (!personalEmail) { alert('Please provide your personal email.'); return; }

            const data = {
                employeeId: MY_ID,
                employeeName: MY_NAME,
                personalEmail: personalEmail,
                reason: document.getElementById('reason').value,
                lwd: document.getElementById('lwd').value,
                comments: document.getElementById('comments').value
            };

            try {
                await api.submitResignation(data);
                alert('Resignation submitted successfully!');
                initPortal();
            } catch (e) {
                alert('Failed to submit. Is the server running?');
            }
        }

        function showTrackingDashboard(container, data) {
            const steps = [
                { id: 1, name: 'Request' },
                { id: 2, name: 'Manager' },
                { id: 3, name: 'HR Review' },
                { id: 4, name: 'Notice' },
                { id: 5, name: 'Clearance' }
            ];

            container.innerHTML = `
                <div class="card" style="padding: 2.5rem 2rem;">
                    <div style="text-align: center; margin-bottom: 3rem;">
                        <h3 class="card-title">Transition Progress</h3>
                        <p style="color: var(--text-muted); font-size: 0.85rem;">Track your offboarding journey in real-time.</p>
                    </div>

                    <div class="timeline">
                        ${steps.map(s => `
                            <div class="timeline-step ${s.id < (data.step || 1) ? 'completed' : (s.id === (data.step || 1) ? 'active' : '')}">
                                <div class="step-dot">
                                    ${s.id < (data.step || 1) ? '<i data-lucide="check" style="width: 14px;"></i>' : s.id}
                                </div>
                                <span class="step-label">${s.name}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
                            <div>
                                <h3 class="card-title">General Status</h3>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Current Phase: <b>${data.status}</b></p>
                            </div>
                            <span class="badge ${data.status === 'Relieved' ? 'badge-success' : 'badge-blue'}">${data.status}</span>
                        </div>
                        
                        <div style="padding: 2rem; background: var(--bg-main); border-radius: var(--radius-md); text-align: center; position: relative; overflow: hidden;">
                            <div style="position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--primary);"></div>
                            <p style="font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;">Last Working Day</p>
                            <h2 style="font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; color: var(--text-main);">${data.lwd}</h2>
                            <p style="color: var(--text-muted); font-size: 0.9rem;">LWD confirmed by HR administration.</p>
                        </div>

                        ${data.status === 'Rejected' ? `
                            <div style="margin-top: 2rem; padding: 1.5rem; border: 1px dashed var(--danger); border-radius: var(--radius-md); text-align: center; background: #FFF5F5;">
                                <p style="color: var(--danger); font-weight: 600; margin-bottom: 1rem;">Process could not proceed. Please check manager comments.</p>
                                <button class="btn btn-primary" onclick="showSubmissionForm(document.getElementById('portal-body'))">Revise Submission</button>
                            </div>

                    </div>

                    <div class="card" style="padding: 1.5rem;">
                        <h4 style="margin-bottom: 1.5rem; font-size: 0.9rem;">Administrative Log</h4>
                        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                            <div>
                                <p style="font-size: 0.75rem; color: #94A3B8; font-weight: 700; text-transform: uppercase;">Submission Date</p>
                                <p style="font-weight: 600; font-size: 0.9rem;">${new Date(data.createdAt).toLocaleDateString()}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.75rem; color: #94A3B8; font-weight: 700; text-transform: uppercase;">Destination Email</p>
                                <p style="font-weight: 600; font-size: 0.9rem;">${data.personalEmail}</p>
                            </div>
                            <div style="padding-top: 1rem; border-top: 1px solid var(--border);">
                                <p style="font-size: 0.75rem; color: #94A3B8; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem;">Notes</p>
                                <div style="font-style: italic; font-size: 0.85rem; color: var(--text-muted); background: #f8fafc; padding: 1rem; border-radius: 8px;">
                                    "${data.managerComments || 'Awaiting feedback from reporting manager...'}"

                        </div>
                    </div>
                </div>
            `;
        }

        // Global variable to store transfer state for sidebar re-renders
        let HAS_TRANSFERS = false;

        async function initPortal() {
            try {
                // Set Header Details Dynamically
                document.getElementById('header-user-name').textContent = MY_NAME;
                document.getElementById('header-user-id').textContent = MY_ID;
                document.getElementById('header-user-avatar').textContent = MY_NAME.charAt(0);

                // Fetch transfers defensively
                const transfers = await api.getTransfers({ employeeId: MY_ID }).catch(e => []);
                HAS_TRANSFERS = Array.isArray(transfers) && transfers.length > 0;
                
                if (HAS_TRANSFERS && transfers.some(t => t.status === 'Pending')) {
                    document.getElementById('notif-dot').style.display = 'block';
                }
            } catch (err) {
                console.warn("Transfer Notification Check Failed:", err);
            }
            
            // Always attempt to render the shell
            renderSidebar(HAS_TRANSFERS);
            renderContent();
            lucide.createIcons();
        }

        async function renderTransferView(container) {
            document.getElementById('page-title').textContent = "Transfer Orders";
            document.getElementById('page-subtitle').textContent = "Review and respond to organization movement requests.";

            const transfers = await api.getTransfers({ employeeId: MY_ID }).catch(e => []);
            const pending = Array.isArray(transfers) ? transfers.find(t => t.status === 'Pending') : null;

            if (!pending) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 4rem;">
                        <div style="width: 64px; height: 64px; background: #f0f7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                            <i data-lucide="check-circle" style="color: #60a5fa; width: 32px; height: 32px;"></i>
                        </div>
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">No Pending Orders</h3>
                        <p style="color: var(--text-muted);">You don't have any active transfer requests at this time.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="card" style="max-width: 600px; margin: 0 auto; border-top: 4px solid var(--primary);">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
                        <div>
                            <span class="badge badge-blue" style="margin-bottom: 0.5rem;">New Transfer Order</span>
                            <h2 style="font-size: 1.5rem; font-weight: 800;">Organization Movement</h2>
                        </div>
                        <i data-lucide="arrow-right-left" style="color: var(--primary); width: 32px; height: 32px;"></i>
                    </div>

                    <div style="background: #f8fafc; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border);">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                            <div style="text-align: center; flex: 1;">
                                <p style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">From</p>
                                <p style="font-weight: 700; color: var(--text-main);">${pending.fromCompany}</p>
                            </div>
                            <i data-lucide="arrow-right" style="color: var(--text-muted); width: 16px;"></i>
                            <div style="text-align: center; flex: 1;">
                                <p style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">To</p>
                                <p style="font-weight: 700; color: var(--primary);">${pending.toCompany}</p>
                            </div>
                        </div>
                        <div style="border-top: 1px solid #e2e8f0; padding-top: 1rem;">
                            <p style="font-size: 0.85rem; color: var(--text-muted);">Reporting to: <b>${pending.newManagerId}</b> (new entity)</p>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="handleTransferAction('${pending.id}', 'Rejected')">Reject Transfer</button>
                        <button class="btn btn-primary" onclick="handleTransferAction('${pending.id}', 'Accepted')">Accept & Transfer</button>
                    </div>
                    <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 1.5rem;">Transition will be immediate upon acceptance.</p>
                </div>
            `;
        }

        async function handleTransferAction(id, status) {
            if (!confirm(`Are you sure you want to ${status.toLowerCase()} this transfer?`)) return;
            
            try {
                await api.updateTransfer(id, { status });
                alert(`Transfer Order ${status}!`);
                if (status === 'Accepted') {
                    location.reload(); // Reload to apply company changes
                } else {
                    switchSubView('transfers');
                }
            } catch (err) {
                alert('Error processing transfer: ' + err.message);
            }
        }
        
        initPortal();
    </script>
</body>
</html>
